<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF7F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F0E8;stop-opacity:1" />
    </linearGradient>
    <filter id="s" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#D4C4A8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <rect x="1" y="1" width="398" height="298" fill="none" stroke="#D4C4A8" stroke-opacity="0.5" stroke-width="1" rx="12"/>
  <text x="200" y="145" font-family="'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif" font-size="52" fill="#B89736" text-anchor="middle" filter="url(#s)">💺</text>
  <text x="200" y="185" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="600" fill="#8B7D6B" text-anchor="middle" letter-spacing="0.5">Jogo de Cadeiras Varanda</text>
  <line x1="160" y1="202" x2="240" y2="202" stroke="#D4C4A8" stroke-opacity="0.6" stroke-width="1"/>
  <text x="200" y="230" font-family="Inter, Arial, sans-serif" font-size="10" fill="#B8AFA0" text-anchor="middle" letter-spacing="2">LISTA DE PRESENTES</text>
